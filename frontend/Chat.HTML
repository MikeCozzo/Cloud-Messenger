<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messenger Chat</title>
</head>
<body>
    <h1>Chat</h1>
    <select id="conversation-list"></select>
    <div id="chat-window" style="border:1px solid #000; height:300px; overflow:auto;"></div>
    <input id="msg-input" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>

<script>
const username = localStorage.getItem("username");
let ws;
let currentConversation = "";

async function loadConversations() {
    const res = await fetch(`http://localhost:8000/conversations/${username}`);
    const convs = await res.json();

    const select = document.getElementById("conversation-list");
    convs.forEach(conv => {
        const other = conv.participants.find(u => u !== username);
        const option = document.createElement("option");
        option.value = other;
        option.innerText = other;
        select.appendChild(option);
    });

    // Load first conversation by default
    if (convs.length > 0) {
        currentConversation = convs[0].participants.find(u => u !== username);
        loadMessages(currentConversation);
    }
}

async function loadMessages(otherUser) {
    currentConversation = otherUser;
    const res = await fetch(`http://localhost:8000/conversations/${username}/${otherUser}`);
    const conv = await res.json();

    const chatWindow = document.getElementById("chat-window");
    chatWindow.innerHTML = "";
    conv.messages.forEach(msg => {
        const div = document.createElement("div");
        div.innerText = `${msg.sender}: ${msg.text}`;
        chatWindow.appendChild(div);
    });
}

function connectWebSocket() {
    ws = new WebSocket(`ws://localhost:8000/ws/${username}`);
    ws.onmessage = event => {
        const msg = JSON.parse(event.data);
        if (msg.sender !== username) {
            const chatWindow = document.getElementById("chat-window");
            const div = document.createElement("div");
            div.innerText = `${msg.sender}: ${msg.text}`;
            chatWindow.appendChild(div);
        }
    };
}

function sendMessage() {
    const text = document.getElementById("msg-input").value;
    if (!text || !currentConversation) return;

    ws.send(JSON.stringify({
        to: currentConversation,
        text: text
    }));

    const chatWindow = document.getElementById("chat-window");
    const div = document.createElement("div");
    div.innerText = `${username}: ${text}`;
    chatWindow.appendChild(div);

    document.getElementById("msg-input").value = "";
}

// Initialize
loadConversations();
connectWebSocket();

// Change conversation
document.getElementById("conversation-list").addEventListener("change", (e) => {
    loadMessages(e.target.value);
});
</script>
</body>
</html>
