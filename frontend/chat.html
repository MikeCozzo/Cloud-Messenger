<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Chat</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #667eea;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 900px;
    height: 600px;
    background: white;
    display: grid;
    grid-template-columns: 250px 1fr;
    border-radius: 12px;
    overflow: hidden;
  }

  .sidebar {
    background: #f4f4f4;
    padding: 10px;
  }

  #conversation-list {
    width: 100%;
    padding: 8px;
  }

  .chat {
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    font-weight: bold;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #fafafa;
  }

  .message {
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    max-width: 70%;
  }

  .me {
    background: #667eea;
    color: white;
    margin-left: auto;
  }

  .them {
    background: #ddd;
    margin-right: auto;
  }

  .input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid #ddd;
  }

  #msg-input {
    flex: 1;
    padding: 8px;
  }

  button {
    padding: 8px 12px;
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
