<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Chat</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 900px;
    height: 600px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    display: grid;
    grid-template-columns: 250px 1fr;
    overflow: hidden;
  }

  .sidebar {
    background: #f7f7fb;
    border-right: 1px solid #eee;
    padding: 15px;
  }

  #conversation-list {
    width: 100%;
    padding: 10px;
  }

  .chat {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .chat-header {
    padding: 15px;
    border-bottom: 1px solid #eee;
    font-weight: bold;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #fafafa;
  }

  .message {
    max-width: 70%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    word-wrap: break-word;
  }

  .me {
    background: #667eea;
    color: white;
    margin-left: auto;
  }

  .them {
    background: #e5e7eb;
    margin-right: auto;
  }

  .input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid #eee;
  }

  #msg-input {
    flex: 1;
    padding: 10px;
  }

  button {
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h3>Chats</h3>
    <select id="conversation-list"></select>
  </div>

  <div class="chat">
    <div class="chat-header" id="chat-header">Select a chat</div>

    <div id="chat-window"></div>

    <div class="input-area">
      <input id="msg-input" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>

const API = "https://cloud-messenger.onrender.com/api";
const WS_URL = "wss://cloud-messenger.onrender.com";

const username = localStorage.getItem("username");

if (!username) {
    alert("Please log in first");
    window.location.href = "/index.html";
}

let ws;
let currentConversation = "";

/* ---------------- USERS ---------------- */
async function loadConversations() {
    const res = await fetch(`${API}/users`);
    const users = await res.json();

    const select = document.getElementById("conversation-list");
    select.innerHTML = "";

    users.forEach(u => {
        if (u.username !== username) {
            const opt = document.createElement("option");
            opt.value = u.username;
            opt.innerText = u.username;
            select.appendChild(opt);
        }
    });

    if (select.options.length > 0) {
        select.value = select.options[0].value;
        loadMessages(select.value);
    }
}

/* ---------------- MESSAGES ---------------- */
async function loadMessages(otherUser) {
    currentConversation = otherUser;
    document.getElementById("chat-header").innerText = otherUser;

    const res = await fetch(`${API}/conversations/${username}/${otherUser}`);
    const conv = await res.json();

    const box = document.getElementById("chat-window");
    box.innerHTML = "";

    (conv.messages || []).forEach(msg => {
        const div = document.createElement("div");
        div.classList.add("message");
        div.classList.add(msg.sender === username ? "me" : "them");
        div.innerText = msg.text;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

/* ---------------- WEBSOCKET ---------------- */
function connectWebSocket() {
    ws = new WebSocket(`${WS_URL}/ws/${username}`);

    ws.onopen = () => {
        console.log("WebSocket connected");
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        const isCurrentChat =
            msg.sender === currentConversation ||
            msg.sender === username;

        if (!isCurrentChat) return;

        const div = document.createElement("div");
        div.classList.add("message");
        div.classList.add(msg.sender === username ? "me" : "them");
        div.innerText = msg.text;

        const box = document.getElementById("chat-window");
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    };

    ws.onclose = () => {
        console.log("WebSocket closed, reconnecting...");
        setTimeout(connectWebSocket, 2000);
    };

    ws.onerror = (err) => {
        console.log("WebSocket error:", err);
    };
}

/* ---------------- SEND MESSAGE ---------------- */
function sendMessage() {
    const text = document.getElementById("msg-input").value;

    if (!text || !currentConversation) return;

    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Connecting... please wait");
        return;
    }

    ws.send(JSON.stringify({
        to: currentConversation,
        text: text
    }));

    const div = document.createElement("div");
    div.classList.add("message", "me");
    div.innerText = text;

    const box = document.getElementById("chat-window");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;

    document.getElementById("msg-input").value = "";
}

/* ---------------- INIT ---------------- */
loadConversations();
connectWebSocket();

document.getElementById("conversation-list")
.addEventListener("change", e => loadMessages(e.target.value));

</script>

</body>
</html>
