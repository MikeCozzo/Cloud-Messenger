<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messenger Chat</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #667eea;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 900px;
  height: 600px;
  background: white;
  display: grid;
  grid-template-columns: 250px 1fr;
  border-radius: 12px;
  overflow: hidden;
}

.sidebar {
  background: #f4f4f4;
  padding: 10px;
}

.chat {
  display: flex;
  flex-direction: column;
}

.chat-header {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

#chat-window {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  background: #fafafa;
}

.message {
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  max-width: 70%;
}

.me {
  background: #667eea;
  color: white;
  margin-left: auto;
}

.them {
  background: #ddd;
}

.input-area {
  display: flex;
  padding: 10px;
  gap: 10px;
  border-top: 1px solid #ddd;
}

#msg-input {
  flex: 1;
  padding: 8px;
}

button {
  background: #667eea;
  color: white;
  border: none;
  padding: 8px 12px;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div id="conversation-list">Users will go here</div>
  </div>

  <div class="chat">

    <div class="chat-header" id="chat-header">Chat</div>

    <div id="chat-window"></div>

    <div class="input-area">
      <input id="msg-input" placeholder="Type message..." />
      <button id="send-btn">Send</button>
    </div>

  </div>

</div>

<script>
const currentUser = prompt("Enter your username:");
let selectedUser = "bob"; // change dynamically later

const chatWindow = document.getElementById("chat-window");
const input = document.getElementById("msg-input");

let ws;

// -------------------------
// CONNECT WEBSOCKET
// -------------------------
function connectWS() {
  ws = new WebSocket(`wss://${location.host}/ws/${currentUser}`);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    appendMessage(msg.text, msg.sender);
  };
}

connectWS();

// -------------------------
// LOAD HISTORY
// -------------------------
async function loadMessages() {
  const res = await fetch(`/api/messages?user1=${currentUser}&user2=${selectedUser}`);
  const data = await res.json();

  chatWindow.innerHTML = "";
  data.forEach(m => appendMessage(m.text, m.sender));
}

// -------------------------
// RENDER MESSAGE
// -------------------------
function appendMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "message " + (sender === currentUser ? "me" : "them");
  div.textContent = text;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

// -------------------------
// SEND MESSAGE
// -------------------------
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  ws.send(JSON.stringify({
    to: selectedUser,
    text: text
  }));

  appendMessage(text, currentUser);
  input.value = "";
}

document.getElementById("send-btn").onclick = sendMessage;

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

// -------------------------
// INIT
// -------------------------
loadMessages();
</script>

</body>
</html>
