<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Chat</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #667eea;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 900px;
    height: 600px;
    background: white;
    display: grid;
    grid-template-columns: 250px 1fr;
    border-radius: 12px;
    overflow: hidden;
  }

  .sidebar {
    background: #f4f4f4;
    padding: 10px;
  }

  #conversation-list {
    width: 100%;
    padding: 8px;
  }

  .chat {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .chat-header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    font-weight: bold;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #fafafa;
  }

  .message {
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    max-width: 70%;
  }

  .me {
    background: #667eea;
    color: white;
    margin-left: auto;
  }

  .them {
    background: #ddd;
    margin-right: auto;
  }

  .input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid #ddd;
  }

  #msg-input {
    flex: 1;
    padding: 8px;
  }

  button {
    padding: 8px 12px;
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
  }

  .empty {
    color: #777;
    text-align: center;
    margin-top: 20px;
  }

  .error {
    color: red;
    font-size: 12px;
    margin: 5px;
  }
</style>
</head>

<body>

<div class="app">
  <div class="sidebar">
    <div id="conversation-list">Loading chats...</div>
  </div>

  <div class="chat">
    <div class="chat-header">Chat</div>

    <div id="chat-window">
      <div class="empty">Loading messages...</div>
    </div>

    <div class="input-area">
      <input id="msg-input" placeholder="Type a message..." />
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let currentConversationId = 1;

  const chatWindow = document.getElementById("chat-window");
  const convoList = document.getElementById("conversation-list");
  const input = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");

  // -------------------------
  // Render messages safely
  // -------------------------
  function renderMessages(messages) {
    chatWindow.innerHTML = "";

    if (!messages || messages.length === 0) {
      chatWindow.innerHTML = `<div class="empty">No messages yet</div>`;
      return;
    }

    messages.forEach(msg => {
      const div = document.createElement("div");
      div.classList.add("message");

      div.classList.add(msg.sender === "me" ? "me" : "them");
      div.textContent = msg.text ?? "(empty message)";

      chatWindow.appendChild(div);
    });

    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // -------------------------
  // Show errors on screen
  // -------------------------
  function showError(err) {
    console.error(err);
    chatWindow.innerHTML = `<div class="error">Error loading messages. Check console / backend.</div>`;
  }

  // -------------------------
  // Fetch messages
  // -------------------------
  async function fetchMessages() {
    try {
      const res = await fetch(`/messages?conversation_id=${currentConversationId}`);

      if (!res.ok) throw new Error("HTTP error " + res.status);

      const data = await res.json();
      renderMessages(data);

    } catch (err) {
      showError(err);
    }
  }

  // -------------------------
  // Send message
  // -------------------------
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    try {
      await fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          conversation_id: currentConversationId,
          text
        })
      });

      input.value = "";
      fetchMessages();

    } catch (err) {
      showError(err);
    }
  }

  // -------------------------
  // Bind button
  // -------------------------
  sendBtn.addEventListener("click", sendMessage);

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  // -------------------------
  // LIVE POLLING
  // -------------------------
  fetchMessages();
  setInterval(fetchMessages, 1500);

});
</script>

</body>
</html>
