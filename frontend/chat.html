<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Chat</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 900px;
    height: 600px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    display: grid;
    grid-template-columns: 250px 1fr;
    overflow: hidden;
  }

  .sidebar {
    background: #f7f7fb;
    border-right: 1px solid #eee;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sidebar h2 {
    margin: 0;
    font-size: 18px;
    color: #333;
  }

  #conversation-list {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  .chat {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .chat-header {
    padding: 15px;
    border-bottom: 1px solid #eee;
    font-weight: bold;
    color: #333;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #fafafa;
  }

  .message {
    max-width: 70%;
    padding: 10px 12px;
    margin-bottom: 10px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .me {
    background: #667eea;
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 4px;
  }

  .them {
    background: #e5e7eb;
    color: #333;
    margin-right: auto;
    border-bottom-left-radius: 4px;
  }

  .input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #eee;
    gap: 10px;
  }

  #msg-input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  #msg-input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
  }

  button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #5a67d8;
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <h2>Chats</h2>
    <select id="conversation-list"></select>
  </div>

  <div class="chat">
    <div class="chat-header" id="chat-header">Select a conversation</div>
    <div id="chat-window"></div>

    <div class="input-area">
      <input id="msg-input" placeholder="Type a message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API = "https://cloud-messenger.onrender.com/api";
const WS_BASE = "wss://cloud-messenger.onrender.com";

const username = localStorage.getItem("username");

if (!username) {
    alert("Please log in first.");
    window.location.href = "/index.html";
}

let ws = null;
let currentConversation = "";
let wsReady = false;

function scrollChatToBottom() {
    const chatWindow = document.getElementById("chat-window");
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

function renderMessage(msg, isMe = false) {
    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(isMe ? "me" : "them");
    div.innerText = isMe ? msg.text : `${msg.sender}: ${msg.text}`;

    const chatWindow = document.getElementById("chat-window");
    chatWindow.appendChild(div);
    scrollChatToBottom();
}

async function loadConversations() {
    const res = await fetch(`${API}/users`);
    const users = await res.json();

    const select = document.getElementById("conversation-list");
    select.innerHTML = "";

    users.forEach(user => {
        if (user.username !== username) {
            const option = document.createElement("option");
            option.value = user.username;
            option.innerText = user.username;
            select.appendChild(option);
        }
    });

    if (select.options.length > 0) {
        currentConversation = select.options[0].value;
        document.getElementById("chat-header").innerText = currentConversation;
        await loadMessages(currentConversation);
    } else {
        document.getElementById("chat-header").innerText = "No other users found";
    }
}

async function loadMessages(otherUser) {
    currentConversation = otherUser;
    document.getElementById("chat-header").innerText = otherUser;

    const res = await fetch(`${API}/conversations/${username}/${otherUser}`);
    const conv = await res.json();

    const chatWindow = document.getElementById("chat-window");
    chatWindow.innerHTML = "";

    (conv.messages || []).forEach(msg => {
        renderMessage(msg, msg.sender === username);
    });

    scrollChatToBottom();
}

function connectWebSocket() {
    ws = new WebSocket(`${WS_BASE}/ws/${username}`);

    ws.onopen = () => {
        console.log("WebSocket connected");
        wsReady = true;
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.sender === username) {
            renderMessage(msg, true);
        } else if (msg.sender === currentConversation) {
            renderMessage(msg, false);
        }
    };

    ws.onerror = (err) => {
        console.log("WebSocket error:", err);
        wsReady = false;
    };

    ws.onclose = () => {
        console.log("WebSocket closed, reconnecting...");
        wsReady = false;
        setTimeout(connectWebSocket, 2000);
    };
}

function sendMessage() {
    const input = document.getElementById("msg-input");
    const text = input.value.trim();

    if (!text || !currentConversation) return;

    if (!ws || ws.readyState !== WebSocket.OPEN || !wsReady) {
        alert("WebSocket not connected yet. Please wait...");
        return;
    }

    const payload = {
        to: currentConversation,
        text: text
    };

    ws.send(JSON.stringify(payload));
    input.value = "";
}

document.getElementById("conversation-list").addEventListener("change", (e) => {
    loadMessages(e.target.value);
});

document.getElementById("msg-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        sendMessage();
    }
});

loadConversations();
connectWebSocket();
</script>

</body>
</html>
