<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Chat</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #667eea;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 900px;
    height: 600px;
    background: white;
    display: grid;
    grid-template-columns: 250px 1fr;
    border-radius: 12px;
    overflow: hidden;
  }

  .sidebar {
    background: #f4f4f4;
    padding: 10px;
  }

  #conversation-list {
    width: 100%;
    padding: 8px;
  }

  .chat {
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    font-weight: bold;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #fafafa;
  }

  .message {
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    max-width: 70%;
  }

  .me {
    background: #667eea;
    color: white;
    margin-left: auto;
  }

  .them {
    background: #ddd;
    margin-right: auto;
  }

  .input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid #ddd;
  }

  #msg-input {
    flex: 1;
    padding: 8px;
  }

  button {
    padding: 8px 12px;
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div id="conversation-list"></div>
  </div>

  <div class="chat">
    <div class="chat-header">Chat</div>

    <div id="chat-window"></div>

    <div class="input-area">
      <input id="msg-input" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>
let currentConversationId = 1;

// -------------------------
// Render messages
// -------------------------
function renderMessages(messages) {
  const chatWindow = document.getElementById("chat-window");
  chatWindow.innerHTML = "";

  messages.forEach(msg => {
    const div = document.createElement("div");
    div.classList.add("message");

    // adjust this depending on your backend structure
    div.classList.add(msg.sender === "me" ? "me" : "them");

    div.textContent = msg.text;
    chatWindow.appendChild(div);
  });

  chatWindow.scrollTop = chatWindow.scrollHeight;
}

// -------------------------
// Fetch messages (LIVE)
// -------------------------
async function fetchMessages() {
  try {
    const res = await fetch(`/messages?conversation_id=${currentConversationId}`);
    const data = await res.json();
    renderMessages(data);
  } catch (err) {
    console.error("Failed to fetch messages:", err);
  }
}

// -------------------------
// Auto-refresh every 1.5s
// -------------------------
setInterval(fetchMessages, 1500);

// initial load
fetchMessages();

// -------------------------
// Send message
// -------------------------
async function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text) return;

  await fetch("/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      conversation_id: currentConversationId,
      text: text
    })
  });

  input.value = "";

  // instantly refresh after sending
  fetchMessages();
}
</script>

</body>
</html>
