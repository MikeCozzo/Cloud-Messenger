<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Chat</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #667eea;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 900px;
    height: 600px;
    background: white;
    display: grid;
    grid-template-columns: 250px 1fr;
    border-radius: 12px;
    overflow: hidden;
  }

  .sidebar {
    background: #f4f4f4;
    padding: 10px;
    overflow-y: auto;
  }

  .user {
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #ddd;
  }

  .user:hover {
    background: #eaeaea;
  }

  .chat {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .chat-header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    font-weight: bold;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #fafafa;
  }

  .message {
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    max-width: 70%;
  }
  
  .me {
    background: #667eea;
    color: white;
    margin-left: auto;
  }

  .them {
    background: #ddd;
    margin-right: auto;
  }

  .input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid #ddd;
  }

  #msg-input {
    flex: 1;
    padding: 8px;
  }

  button {
    padding: 8px 12px;
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div id="conversation-list">Loading users...</div>
  </div>

  <!-- CHAT -->
  <div class="chat">

    <div class="chat-header" id="chat-header">
      Select a user
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
      <input id="msg-input" placeholder="Type a message..." />
      <button id="send-btn">Send</button>
    </div>

  </div>

</div>

<script>
let currentUser = localStorage.getItem("username");

if (!currentUser) {
  alert("Not logged in");
  window.location.href = "/";
}
let selectedUser = null;

const chatWindow = document.getElementById("chat-window");
const input = document.getElementById("msg-input");
const list = document.getElementById("conversation-list");
const header = document.getElementById("chat-header");

let ws;

//connect websocket. real time messaging connection to server
function connectWS() {
  ws = new WebSocket(`wss://${location.host}/ws/${currentUser}`);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    // only show if from active chat
    if (msg.sender === selectedUser || msg.sender === currentUser) {
      appendMessage(msg.text, msg.sender);
    }
  };
}
//start websocket connection
connectWS();

//fetch users from backend API
async function loadUsers() {
  const res = await fetch("/api/users");
  const users = await res.json();

  list.innerHTML = "";

  users
    .filter(u => u.username !== currentUser)
    .forEach(user => {
      const div = document.createElement("div");
      div.className = "user";
      div.textContent = user.username;

      div.onclick = () => {
        selectedUser = user.username;
        header.textContent = `Chat with ${selectedUser}`;
        loadMessages();
      };

      list.appendChild(div);
    });
}

//fetch message history between two users

async function loadMessages() {
  if (!selectedUser) return;

  const res = await fetch(
    `/api/messages?user1=${currentUser}&user2=${selectedUser}`
  );

  const messages = await res.json();

  chatWindow.innerHTML = "";
  messages.forEach(m => appendMessage(m.text, m.sender));
}

//display message in UI
function appendMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "message " + (sender === currentUser ? "me" : "them");
  div.textContent = text;

  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

//send message
function sendMessage() {
  const text = input.value.trim();
  if (!text || !selectedUser) return;

  ws.send(JSON.stringify({
    to: selectedUser,
    text: text
  }));

  appendMessage(text, currentUser);
  input.value = "";
}

document.getElementById("send-btn").onclick = sendMessage;

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

// -------------------------
// INIT
// -------------------------
loadUsers();
</script>

</body>
</html>
