<!DOCTYPE html>
<html lang="en">
<head>
#basic page settings
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Login</title>
#ui design
<style>
  * {
    box-sizing: border-box;
  }
    /* Full-page centered gradient background */
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Main login/register card container */
  .container {
    background: white;
    padding: 30px;
    border-radius: 16px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
 /* Section titles (Login / Register) */
  h1 {
    font-size: 20px;
    margin: 20px 0 10px;
    color: #333;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.2s;
  }

  input:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #5a67d8;
  }

  .divider {
    margin: 20px 0;
    text-align: center;
    font-size: 12px;
    color: #888;
  }

  #message {
    margin-top: 15px;
    font-weight: bold;
    text-align: center;
    color: #e53e3e;
  }

</style>
</head>

<body>
#main login UI container
<div class="container">
  <h1>Login</h1>
  <input id="login-username" placeholder="Username">
  <input id="login-password" placeholder="Password" type="password">
  <button onclick="login()">Login</button>

  <div class="divider">OR</div>

  <h1>Register</h1>
  <input id="reg-username" placeholder="Username">
  <input id="reg-password" placeholder="Password" type="password">
  <button onclick="register()">Register</button>

  <p id="message"></p>
</div>
#auth logic
<script>
/* Base API URL for backend server */
const API = "https://cloud-messenger.onrender.com/api";

// Login function
async function login() {
  //user input values
  const username = document.getElementById("login-username").value;
  const password = document.getElementById("login-password").value;
 // Validate empty fields
  if (!username || !password) {
    document.getElementById("message").innerText = "Please enter both username and password";
    return;
  }

  try {
     // Send login request to backend
    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();
     // Show response message (success or error)
    document.getElementById("message").innerText = data.status || data.error;
 // If login succeeds, store username and redirect
    if (data.status === "Login successful") {
      localStorage.setItem("username", username);
      window.location.href = "/chat.html";
    }

  } catch (err) {
    document.getElementById("message").innerText = "Login failed: " + err;
  }
}

// Register
async function register() {
  //Get registration input values
  const username = document.getElementById("reg-username").value;
  const password = document.getElementById("reg-password").value;
//validate empty fields
  if (!username || !password) {
    document.getElementById("message").innerText = "Please enter both username and password";
    return;
  }

  try {
    // Send registration request to backend
    const res = await fetch(`${API}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    document.getElementById("message").innerText = data.status || data.error;

  } catch (err) {
    document.getElementById("message").innerText = "Register failed: " + err;
  }
}
</script>

</body>
</html>
