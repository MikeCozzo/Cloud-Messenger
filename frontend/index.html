<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messenger Login</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
}
input {
    display: block;
    margin: 10px 0;
    padding: 8px;
}
button {
    padding: 8px 14px;
    cursor: pointer;
}
#message {
    margin-top: 20px;
    font-weight: bold;
    color: red;
}
h1 {
    margin-top: 30px;
}
</style>
</head>
<body>

<h1>Login</h1>
<input id="login-username" placeholder="Username">
<input id="login-password" placeholder="Password" type="password">
<button onclick="login()">Login</button>

<h1>Register</h1>
<input id="reg-username" placeholder="Username">
<input id="reg-password" placeholder="Password" type="password">
<button onclick="register()">Register</button>

<p id="message"></p>

<script>
const API = "https://cloud-messenger.onrender.com/api";

// ---------------- LOGIN ----------------
async function login() {
    const username = document.getElementById("login-username").value;
    const password = document.getElementById("login-password").value;

    if (!username || !password) {
        document.getElementById("message").innerText = "Please enter both username and password";
        return;
    }

    try {
        const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        document.getElementById("message").innerText = data.status || data.error;

        if (data.status === "Login successful") {
            localStorage.setItem("username", username);
            window.location.href = "/chat.html";
        }
    } catch (err) {
        document.getElementById("message").innerText = "Login failed: " + err;
    }
}

// ---------------- REGISTER ----------------
async function register() {
    const username = document.getElementById("reg-username").value;
    const password = document.getElementById("reg-password").value;

    if (!username || !password) {
        document.getElementById("message").innerText = "Please enter both username and password";
        return;
    }

    try {
        const res = await fetch(`${API}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        document.getElementById("message").innerText = data.status || data.error;
    } catch (err) {
        document.getElementById("message").innerText = "Register failed: " + err;
    }
}
</script>
</body>
</html>
